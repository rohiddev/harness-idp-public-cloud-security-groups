apiVersion: harness.io/v1
kind: Component
identifier: public_cloud_security_groups
name: Public Cloud Security Groups
type: plugin
owner: platform_engineering
metadata:
  orgIdentifier: default
  projectIdentifier: platform_engineering
  description: >
    Harness IDP plugin and workflow for managing Infrastructure Security Groups
    across Public Cloud accounts. Supports rule management, ServiceNow RITM
    ticket creation, and CSV export.
  tags:
    - public-cloud
    - security
    - aws
    - infrastructure
    - plugin
  annotations:
    backstage.io/source-location: url:https://github.com/rohiddev/harness-idp-public-cloud-security-groups
    github.com/project-slug: rohiddev/harness-idp-public-cloud-security-groups
spec:
  lifecycle: experimental
